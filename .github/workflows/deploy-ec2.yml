name: Deploy to EC2

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up QEMU (for ARM64)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-northeast-1

      - name: Login to AWS ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # バックエンドのビルド & プッシュ (ARM64)
      - name: Build and push Backend
        uses: docker/build-push-action@v5
        with:
          context: ./Backend
          push: true
          tags: ${{ steps.login-ecr.outputs.registry }}/${{ secrets.ECR_REPOSITORY_BACKEND }}:latest
          platforms: linux/arm64

      # フロントエンドのビルド & プッシュ (ARM64)
      - name: Build and push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: ${{ steps.login-ecr.outputs.registry }}/${{ secrets.ECR_REPOSITORY_FRONTEND }}:latest
          platforms: linux/arm64

      # SSH経由でEC2にデプロイ
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: DB_SECRET_ARN,OPENAI_SECRET_ARN
          script: |
            export DB_SECRET_ARN="${{ secrets.DB_SECRET_ARN }}"
            export OPENAI_SECRET_ARN="${{ secrets.OPENAI_SECRET_ARN }}"
            mkdir -p /home/ubuntu/soc-app
            cd /home/ubuntu/soc-app
            if [ ! -d ".git" ]; then
              git clone https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git .
            else
              git pull origin ${{ github.ref_name }} || git checkout ${{ github.ref_name }}
            fi
            # Secrets Manager から .env を自動生成
            bash infra/scripts/setup-env.sh
            # ECR ログイン (IAM ロール経由)
            aws ecr get-login-password --region ap-northeast-1 | docker login --username AWS --password-stdin ${{ steps.login-ecr.outputs.registry }}
            docker compose pull
            docker compose up -d
