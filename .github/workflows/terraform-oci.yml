name: Terraform OCI

on:
  push:
    branches:
      - main
    paths:
      - "infra/terraform/environments/oci/**"
      - "infra/terraform/modules/oci-**"
  pull_request:
    paths:
      - "infra/terraform/environments/oci/**"
      - "infra/terraform/modules/oci-**"

env:
  TF_WORKING_DIR: infra/terraform/environments/oci

jobs:
  terraform-plan:
    name: Terraform Plan
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ env.TF_WORKING_DIR }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.9.0"

      - name: Write OCI private key
        run: |
          mkdir -p ~/.oci
          echo "${{ secrets.OCI_PRIVATE_KEY }}" > ~/.oci/oci_api_key.pem
          chmod 600 ~/.oci/oci_api_key.pem

      - name: Write terraform.tfvars
        run: |
          cat > terraform.tfvars <<EOF
          tenancy_ocid        = "${{ secrets.OCI_TENANCY_OCID }}"
          user_ocid           = "${{ secrets.OCI_USER_OCID }}"
          fingerprint         = "${{ secrets.OCI_FINGERPRINT }}"
          private_key_content = "${{ secrets.OCI_PRIVATE_KEY }}"
          region              = "${{ secrets.OCI_REGION }}"
          compartment_id      = "${{ secrets.OCI_COMPARTMENT_ID }}"
          availability_domain = "${{ secrets.OCI_AVAILABILITY_DOMAIN }}"
          ssh_authorized_keys = "${{ secrets.OCI_SSH_PUBLIC_KEY }}"
          image_id            = "${{ secrets.OCI_IMAGE_ID }}"
          db_admin_password   = "${{ secrets.OCI_DB_ADMIN_PASSWORD }}"
          EOF

      - name: Terraform Init
        run: terraform init

      - name: Terraform Format Check
        run: terraform fmt -check -recursive

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        run: terraform plan -out=tfplan

      - name: Upload Plan
        uses: actions/upload-artifact@v7
        with:
          name: tfplan
          path: ${{ env.TF_WORKING_DIR }}/tfplan
          retention-days: 7

  terraform-apply:
    name: Terraform Apply
    runs-on: ubuntu-latest
    needs: terraform-plan
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production
    defaults:
      run:
        working-directory: ${{ env.TF_WORKING_DIR }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.9.0"

      - name: Write OCI private key
        run: |
          mkdir -p ~/.oci
          echo "${{ secrets.OCI_PRIVATE_KEY }}" > ~/.oci/oci_api_key.pem
          chmod 600 ~/.oci/oci_api_key.pem

      - name: Write terraform.tfvars
        run: |
          cat > terraform.tfvars <<EOF
          tenancy_ocid        = "${{ secrets.OCI_TENANCY_OCID }}"
          user_ocid           = "${{ secrets.OCI_USER_OCID }}"
          fingerprint         = "${{ secrets.OCI_FINGERPRINT }}"
          private_key_content = "${{ secrets.OCI_PRIVATE_KEY }}"
          region              = "${{ secrets.OCI_REGION }}"
          compartment_id      = "${{ secrets.OCI_COMPARTMENT_ID }}"
          availability_domain = "${{ secrets.OCI_AVAILABILITY_DOMAIN }}"
          ssh_authorized_keys = "${{ secrets.OCI_SSH_PUBLIC_KEY }}"
          image_id            = "${{ secrets.OCI_IMAGE_ID }}"
          db_admin_password   = "${{ secrets.OCI_DB_ADMIN_PASSWORD }}"
          EOF

      - name: Download Plan
        uses: actions/download-artifact@v4
        with:
          name: tfplan
          path: ${{ env.TF_WORKING_DIR }}

      - name: Terraform Init
        run: terraform init

      - name: Terraform Apply
        run: terraform apply -auto-approve tfplan
