name: RAG Python Tests

on:
  push:
    paths:
      - 'rag/**'
  pull_request:
    paths:
      - 'rag/**'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install dependencies if present
        run: |
          if [ -f rag/requirements.txt ]; then pip install -r rag/requirements.txt; fi
          if [ -f rag/constraints.txt ]; then pip install -r rag/constraints.txt || true; fi
          pip install pytest coverage pytest-cov

      - name: Run tests with coverage
        working-directory: rag
        run: |
          python -m pytest tests -q --maxfail=1 --disable-warnings --cov=.

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rag-test-coverage
          path: rag/coverage.xml || coverage.xml || ''
