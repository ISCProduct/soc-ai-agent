services:
  backend:
    image: 970835573274.dkr.ecr.ap-northeast-1.amazonaws.com/soc-backend:latest
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      DB_HOST: database-3.cdbaszsalwj8.ap-northeast-1.rds.amazonaws.com
      DB_PORT: "3306"
      APP_ENV: production
    env_file:
      - .env

  frontend:
    image: 970835573274.dkr.ecr.ap-northeast-1.amazonaws.com/soc-frontend:latest
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8080
      APP_ENV: production
    depends_on:
      - backend
